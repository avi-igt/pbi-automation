# pbi-automation configuration file
# Update these values to match your Fabric workspace and dataset GUIDs.
# Run: python generate_all.py   after editing this file.

[fabric]
workspace_name  = Missouri - D1V1
tenant_id       = f0b72488-7082-488a-a7e8-eada97bd842d

# Dataset GUIDs — find these in the Fabric workspace URL or from Report Builder.
# Format: ModelName = <guid>   (ModelName must match the MO_* prefix used in reports)
[datasets]
MO_Sales            = 45ddd7fc-a26e-4f4b-86c5-fac56b42553b
MO_LVMSales         = 43e859dd-1721-47ae-93c5-06156328a9a8
MO_CoreTables       = cc60d8fc-beeb-4d68-bcaf-058914925deb
MO_DrawData         = dfff48d9-8c93-4875-ab98-d4ca8b20e24c
MO_Inventory        = 60d83ea0-3aef-47b1-bace-2a7281709f61
MO_WinnerData       = 96a3324d-ae40-47a6-bbd2-a83223f5a843
MO_Payments         = TODO_GUID_MO_Payments
MO_Promotions       = TODO_GUID_MO_Promotions
MO_Invoice          = TODO_GUID_MO_Invoice
MO_IntervalSales    = TODO_GUID_MO_IntervalSales
MO_LVMTransactional = TODO_GUID_MO_LVMTransactional

# ── Data source type detection ────────────────────────────────────────────────
# Keywords matched case-insensitively against a report's name + summary + notes
# + legacy path.  First matching key wins; list more-specific types first.
[datasource_keywords]
snowflake = RDST, TMIR, Security
db2       = claim, payment, annuities, debt, setoff, player, ssn, claimant, 1098

# ── Semantic model selection ──────────────────────────────────────────────────
# Keywords matched against report name + summary.  First matching model wins.
# Rules:
#   • List more-specific models before broader ones.
#   • Multi-word keywords (e.g. "lvm transaction") are matched as substrings.
#   • MO_Sales is last — it has the broadest keywords ("sales", "retailer", …).
[model_keywords]
MO_LVMTransactional = lvm transaction, lvm transactional
MO_Invoice          = brightstar invoice, brightstar
MO_DrawData         = draw game, jackpot, winning number, cash pop, keno, draw data
MO_WinnerData       = winner, prize, Shares, winning
MO_Payments         = payment, check, annuity, 1042, tax report, claim, 1098
MO_Inventory        = inventory, pack, activated, aging, bin, scratchers
MO_IntervalSales    = interval, hourly, weekly
MO_LVMSales         = lvm, vending, vending machine
MO_CoreTables       = retailer list, chain store, district, device list, terminal list, terminal
MO_Promotions       = promotion, promo, cashless, device
MO_Sales            = sales, validations, cancels, retailer, wager, ticket, revenue

# ODBC data source names and DSNs
[odbc]
# DB2 / ARDB (Awards/Resolution Database, BOA_PS schema)
db2_source_name     = BOADB
db2_dsn             = MOS-Q1-BOADB

# Snowflake direct ODBC (TXNDTL / DIMCORE schemas — e.g. TMIR Retailer)
sfodbc_source_name  = LPC_E2_SFODBC
sfodbc_dsn          = MOS-PX-SFODBC

# RDL page / layout defaults
[rdl]
page_width      = 11in
page_height     = 8.5in
margin          = 0.2in
header_height   = 0.90563in
footer_height   = 0.42486in
body_top_offset = 0.1in
default_font    = Segoe UI
title_font      = Segoe UI Light
title_font_size = 14pt
timezone        = Central Standard Time

# PBIP visual report canvas and branding
[pbip]
canvas_width        = 1280
canvas_height       = 720
theme_name          = CY22SU08
brand_color_grid    = #D6DBEA
brand_color_header  = #FAFAFA

# File paths — relative to the pbi-automation repo root unless absolute
[paths]
# Template RDL (used to extract logo / validate header structure)
rdl_template    = templates/MO_Report_Template.rdl
# FRD .docx (default; can also be passed as CLI arg)
frd_docx        = MO - Performance Wizard Ad Hoc Reporting FRD v1.0.docx
# Directory containing hand-authored SQL files for ODBC reports.
# File name must match the report name (spaces → underscores, same as .rdl output).
# Example: "1042 Tax.rdl"  →  sql/1042_Tax.sql
# If a .sql file is not found the generator falls back to an auto-generated stub.
sql_dir         = sql
