<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260">
  <defs>
    <!-- Brightstar brand: dark charcoal bg, #FF6600 orange accent, white text -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#1e1a17"/>
    </linearGradient>
    <!-- Pure brand orange, slightly lighter for glow -->
    <linearGradient id="brandOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6600"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
    <!-- Subtle orange to white for secondary text elements -->
    <linearGradient id="textFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>
    <filter id="logoGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" fill="url(#bgGrad)" rx="12"/>

  <!-- Subtle dot-grid texture -->
  <g opacity="0.04">
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#FF6600"/>
    </pattern>
    <rect width="900" height="260" fill="url(#dots)" rx="12"/>
  </g>

  <!-- Orange glow halo behind star -->
  <circle cx="56" cy="52" r="32" fill="#FF6600" opacity="0.10" filter="url(#softGlow)"/>

  <!-- ── Brightstar 5-point star logo (orange, glowing) ── -->
  <polygon
    points="56,26  61,42  78,42  65,52  70,68  56,58  42,68  47,52  34,42  51,42"
    fill="url(#brandOrange)" filter="url(#logoGlow)"/>
  <!-- Star inner highlight -->
  <polygon
    points="56,32  59.5,42.5  70,42.5  61.5,48.5  64.5,59  56,53  47.5,59  50.5,48.5  42,42.5  52.5,42.5"
    fill="#FF8C00" opacity="0.4"/>

  <!-- ── Company name ── -->
  <text x="88" y="46" font-family="'Segoe UI', Arial, sans-serif"
        font-size="22" font-weight="800" fill="#FF6600" letter-spacing="2"
        filter="url(#logoGlow)">BRIGHTSTAR LOTTERY</text>
  <text x="88" y="64" font-family="'Segoe UI', Arial, sans-serif"
        font-size="11" font-weight="400" fill="#555555" letter-spacing="3">
    DATA &amp; INSIGHTS — PERFORMANCE WIZARD
  </text>

  <!-- Divider -->
  <rect x="88" y="72" width="280" height="1.5" fill="url(#brandOrange)" opacity="0.6" rx="1"/>

  <!-- ── Tool name — same font weight/size, colour split between pbi and -automation ── -->
  <text x="54" y="144" font-family="'Segoe UI', Arial, sans-serif"
        font-size="64" font-weight="900" letter-spacing="-2"
        filter="url(#logoGlow)">
    <tspan fill="url(#brandOrange)">pbi</tspan><tspan fill="url(#textFade)">-automation</tspan>
  </text>

  <!-- Tagline -->
  <text x="56" y="165" font-family="'Segoe UI', Arial, sans-serif"
        font-size="13" font-weight="400" fill="#444444" letter-spacing="1">
    report-generator  ·  model-generator  ·  bo-converter
  </text>

  <!-- Orange underline accent -->
  <rect x="56" y="175" width="440" height="2.5" fill="url(#brandOrange)" opacity="0.7" rx="1"/>

  <!-- Pills row -->
  <rect x="56" y="225" width="72" height="22" rx="11" fill="#1e1e1e" stroke="#333333" stroke-width="1"/>
  <text x="92" y="240" font-family="monospace" font-size="10" fill="#888888" text-anchor="middle">Python 3.9+</text>

  <rect x="136" y="225" width="62" height="22" rx="11" fill="#1e1e1e" stroke="#333333" stroke-width="1"/>
  <text x="167" y="240" font-family="monospace" font-size="10" fill="#888888" text-anchor="middle">Snowflake</text>

  <rect x="202" y="225" width="82" height="22" rx="11" fill="#1e1e1e" stroke="#FF6600" stroke-width="1" opacity="0.9"/>
  <text x="243" y="240" font-family="monospace" font-size="10" fill="#FF6600" text-anchor="middle">Power BI / Fabric</text>

  <!-- ── Decorative pipeline (right side) — three tools ── -->
  <circle cx="730" cy="100" r="80" fill="#FF6600" opacity="0.03"/>

  <!-- ── Lane 1: report-generator ── -->
  <text x="620" y="57" font-family="'Segoe UI', sans-serif" font-size="8" fill="#555" letter-spacing="2">REPORT GENERATOR</text>
  <!-- .docx -->
  <rect x="620" y="62" width="46" height="26" rx="5" fill="#1e1e1e" stroke="#FF6600" stroke-width="1.5" opacity="0.9"/>
  <text x="643" y="78" font-family="monospace" font-size="10" fill="#FF6600" text-anchor="middle">.docx</text>
  <line x1="666" y1="75" x2="678" y2="75" stroke="#FF6600" stroke-width="1.5" opacity="0.7"/>
  <polygon points="678,71 686,75 678,79" fill="#FF6600" opacity="0.7"/>
  <!-- frd_parser -->
  <rect x="688" y="62" width="74" height="26" rx="5" fill="#1e1e1e" stroke="#FF8C00" stroke-width="1.5" opacity="0.9"/>
  <text x="725" y="78" font-family="monospace" font-size="9" fill="#FF8C00" text-anchor="middle">frd_parser</text>
  <line x1="762" y1="75" x2="774" y2="75" stroke="#FF8C00" stroke-width="1.5" opacity="0.7"/>
  <polygon points="774,71 782,75 774,79" fill="#FF8C00" opacity="0.7"/>
  <!-- .rdl / .pbip -->
  <rect x="784" y="62" width="56" height="26" rx="5" fill="#1e1e1e" stroke="#FF6600" stroke-width="1.5" opacity="0.9"/>
  <text x="812" y="72" font-family="monospace" font-size="9" fill="#FF6600" text-anchor="middle">.rdl</text>
  <text x="812" y="84" font-family="monospace" font-size="9" fill="#FF8C00" text-anchor="middle">.pbip</text>

  <!-- ── Lane divider 1 ── -->
  <line x1="620" y1="98" x2="848" y2="98" stroke="#2a2a2a" stroke-width="1"/>

  <!-- ── Lane 2: model-generator ── -->
  <text x="620" y="113" font-family="'Segoe UI', sans-serif" font-size="8" fill="#555" letter-spacing="2">MODEL GENERATOR</text>
  <!-- .properties -->
  <rect x="620" y="118" width="68" height="26" rx="5" fill="#1e1e1e" stroke="#888888" stroke-width="1.2" opacity="0.85"/>
  <text x="654" y="134" font-family="monospace" font-size="9" fill="#888888" text-anchor="middle">.properties</text>
  <!-- Snowflake badge above generate.py -->
  <rect x="698" y="105" width="60" height="16" rx="4" fill="#1e1e1e" stroke="#333" stroke-width="1" stroke-dasharray="2,2" opacity="0.9"/>
  <text x="728" y="117" font-family="monospace" font-size="7.5" fill="#555" text-anchor="middle">Snowflake ↓</text>
  <line x1="688" y1="131" x2="698" y2="131" stroke="#888" stroke-width="1.2" opacity="0.6"/>
  <polygon points="698,127 706,131 698,135" fill="#888" opacity="0.6"/>
  <!-- generate.py -->
  <rect x="708" y="118" width="72" height="26" rx="5" fill="#1e1e1e" stroke="#CCCCCC" stroke-width="1.5" opacity="0.7"/>
  <text x="744" y="134" font-family="monospace" font-size="9" fill="#CCCCCC" text-anchor="middle">generate.py</text>
  <line x1="780" y1="131" x2="792" y2="131" stroke="#CCCCCC" stroke-width="1.2" opacity="0.6"/>
  <polygon points="792,127 800,131 792,135" fill="#CCCCCC" opacity="0.6"/>
  <!-- .SemanticModel -->
  <rect x="802" y="118" width="46" height="26" rx="5" fill="#1e1e1e" stroke="#FF6600" stroke-width="1.5" opacity="0.9"/>
  <text x="825" y="128" font-family="monospace" font-size="7.5" fill="#FF6600" text-anchor="middle">.Semantic</text>
  <text x="825" y="139" font-family="monospace" font-size="7.5" fill="#FF8C00" text-anchor="middle">Model/</text>

  <!-- ── Lane divider 2 ── -->
  <line x1="620" y1="154" x2="848" y2="154" stroke="#2a2a2a" stroke-width="1"/>

  <!-- ── Lane 3: bo-converter ── -->
  <text x="620" y="169" font-family="'Segoe UI', sans-serif" font-size="8" fill="#555" letter-spacing="2">BO CONVERTER</text>
  <!-- BO API -->
  <rect x="620" y="174" width="56" height="26" rx="5" fill="#1e1e1e" stroke="#FF6600" stroke-width="1.2" opacity="0.85"/>
  <text x="648" y="190" font-family="monospace" font-size="9" fill="#FF6600" text-anchor="middle">BO API</text>
  <line x1="676" y1="187" x2="686" y2="187" stroke="#FF6600" stroke-width="1.2" opacity="0.6"/>
  <polygon points="686,183 694,187 686,191" fill="#FF6600" opacity="0.6"/>
  <!-- bo_extractor -->
  <rect x="696" y="174" width="80" height="26" rx="5" fill="#1e1e1e" stroke="#FF8C00" stroke-width="1.5" opacity="0.9"/>
  <text x="736" y="190" font-family="monospace" font-size="9" fill="#FF8C00" text-anchor="middle">bo_extractor</text>
  <line x1="776" y1="187" x2="786" y2="187" stroke="#FF8C00" stroke-width="1.2" opacity="0.6"/>
  <polygon points="786,183 794,187 786,191" fill="#FF8C00" opacity="0.6"/>
  <!-- .rdl / .md -->
  <rect x="796" y="174" width="52" height="26" rx="5" fill="#1e1e1e" stroke="#FF6600" stroke-width="1.5" opacity="0.9"/>
  <text x="822" y="184" font-family="monospace" font-size="9" fill="#FF6600" text-anchor="middle">.rdl</text>
  <text x="822" y="196" font-family="monospace" font-size="9" fill="#888" text-anchor="middle">.md</text>
</svg>
