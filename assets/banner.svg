<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <defs>
    <!-- Brightstar brand: dark charcoal bg, #FF6600 orange accent, white text -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#1e1a17"/>
    </linearGradient>
    <!-- Pure brand orange, slightly lighter for glow -->
    <linearGradient id="brandOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6600"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
    <!-- Subtle orange to white for secondary text elements -->
    <linearGradient id="textFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>
    <filter id="logoGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bgGrad)" rx="12"/>

  <!-- Subtle dot-grid texture -->
  <g opacity="0.04">
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#FF6600"/>
    </pattern>
    <rect width="900" height="220" fill="url(#dots)" rx="12"/>
  </g>

  <!-- Orange glow halo behind star -->
  <circle cx="56" cy="52" r="32" fill="#FF6600" opacity="0.10" filter="url(#softGlow)"/>

  <!-- ── Brightstar 5-point star logo (orange, glowing) ── -->
  <polygon
    points="56,26  61,42  78,42  65,52  70,68  56,58  42,68  47,52  34,42  51,42"
    fill="url(#brandOrange)" filter="url(#logoGlow)"/>
  <!-- Star inner highlight -->
  <polygon
    points="56,32  59.5,42.5  70,42.5  61.5,48.5  64.5,59  56,53  47.5,59  50.5,48.5  42,42.5  52.5,42.5"
    fill="#FF8C00" opacity="0.4"/>

  <!-- ── Company name ── -->
  <text x="88" y="46" font-family="'Segoe UI', Arial, sans-serif"
        font-size="22" font-weight="800" fill="#FF6600" letter-spacing="2"
        filter="url(#logoGlow)">BRIGHTSTAR LOTTERY</text>
  <text x="88" y="64" font-family="'Segoe UI', Arial, sans-serif"
        font-size="11" font-weight="400" fill="#555555" letter-spacing="3">
    DATA &amp; INSIGHTS — PERFORMANCE WIZARD
  </text>

  <!-- Divider -->
  <rect x="88" y="72" width="280" height="1.5" fill="url(#brandOrange)" opacity="0.6" rx="1"/>

  <!-- ── Tool name — same font weight/size, colour split between pbi and -automation ── -->
  <text x="54" y="144" font-family="'Segoe UI', Arial, sans-serif"
        font-size="64" font-weight="900" letter-spacing="-2"
        filter="url(#logoGlow)">
    <tspan fill="url(#brandOrange)">pbi</tspan><tspan fill="url(#textFade)">-automation</tspan>
  </text>

  <!-- Tagline -->
  <text x="56" y="165" font-family="'Segoe UI', Arial, sans-serif"
        font-size="13" font-weight="400" fill="#444444" letter-spacing="1">
    FRD  →  Power BI.  Automated.
  </text>

  <!-- Orange underline accent -->
  <rect x="56" y="175" width="350" height="2.5" fill="url(#brandOrange)" opacity="0.7" rx="1"/>

  <!-- Pills row -->
  <rect x="56" y="190" width="72" height="22" rx="11" fill="#1e1e1e" stroke="#333333" stroke-width="1"/>
  <text x="92" y="205" font-family="monospace" font-size="10" fill="#888888" text-anchor="middle">Python 3.9+</text>

  <rect x="136" y="190" width="58" height="22" rx="11" fill="#1e1e1e" stroke="#333333" stroke-width="1"/>
  <text x="165" y="205" font-family="monospace" font-size="10" fill="#888888" text-anchor="middle">MIT License</text>

  <rect x="202" y="190" width="82" height="22" rx="11" fill="#1e1e1e" stroke="#FF6600" stroke-width="1" opacity="0.9"/>
  <text x="243" y="205" font-family="monospace" font-size="10" fill="#FF6600" text-anchor="middle">Power BI / Fabric</text>

  <!-- ── Decorative pipeline (right side) ── -->
  <!-- Glow halo -->
  <circle cx="730" cy="110" r="75" fill="#FF6600" opacity="0.03"/>

  <!-- Node: .docx -->
  <rect x="626" y="46" width="54" height="30" rx="6" fill="#1e1e1e" stroke="#FF6600" stroke-width="1.5" opacity="0.9"/>
  <text x="653" y="65" font-family="monospace" font-size="11" fill="#FF6600" text-anchor="middle">.docx</text>
  <!-- Arrow -->
  <line x1="680" y1="61" x2="696" y2="61" stroke="#FF6600" stroke-width="1.5" opacity="0.6"/>
  <polygon points="696,57 704,61 696,65" fill="#FF6600" opacity="0.6"/>

  <!-- Node: parser -->
  <rect x="706" y="46" width="56" height="30" rx="6" fill="#1e1e1e" stroke="#FF8C00" stroke-width="1.5" opacity="0.9"/>
  <text x="734" y="65" font-family="monospace" font-size="10" fill="#FF8C00" text-anchor="middle">parser</text>
  <!-- Down arrow -->
  <line x1="734" y1="76" x2="734" y2="90" stroke="#FF8C00" stroke-width="1.5" opacity="0.6"/>
  <polygon points="730,90 734,98 738,90" fill="#FF8C00" opacity="0.6"/>

  <!-- Node: JSON -->
  <rect x="706" y="100" width="56" height="30" rx="6" fill="#1e1e1e" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  <text x="734" y="119" font-family="monospace" font-size="11" fill="#FFFFFF" text-anchor="middle">JSON</text>
  <!-- Fork left → .rdl -->
  <line x1="706" y1="115" x2="692" y2="128" stroke="#FF6600" stroke-width="1.2" opacity="0.7"/>
  <polygon points="688,125 684,133 694,131" fill="#FF6600" opacity="0.7"/>
  <!-- Fork right → .pbip -->
  <line x1="762" y1="115" x2="776" y2="128" stroke="#FF8C00" stroke-width="1.2" opacity="0.7"/>
  <polygon points="776,125 780,133 786,131" fill="#FF8C00" opacity="0.7"/>
  <!-- Fork down → .md -->
  <line x1="734" y1="130" x2="734" y2="143" stroke="#666666" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.7"/>
  <polygon points="730,143 734,151 738,143" fill="#666666" opacity="0.6"/>

  <!-- Node: .rdl -->
  <rect x="644" y="136" width="48" height="28" rx="6" fill="#1e1e1e" stroke="#FF6600" stroke-width="1.5" opacity="0.9"/>
  <text x="668" y="154" font-family="monospace" font-size="11" fill="#FF6600" text-anchor="middle" font-weight="bold">.rdl</text>

  <!-- Node: .pbip -->
  <rect x="770" y="136" width="50" height="28" rx="6" fill="#1e1e1e" stroke="#FF8C00" stroke-width="1.5" opacity="0.9"/>
  <text x="795" y="154" font-family="monospace" font-size="11" fill="#FF8C00" text-anchor="middle" font-weight="bold">.pbip</text>

  <!-- Node: .md (review docs, dashed) -->
  <rect x="710" y="153" width="48" height="26" rx="6" fill="#1e1e1e" stroke="#666666" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.85"/>
  <text x="734" y="170" font-family="monospace" font-size="11" fill="#666666" text-anchor="middle" font-weight="bold">.md</text>
</svg>
