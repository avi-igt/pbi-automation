  STATUS_REASON_CODE:            Status Reason Code
  STATUS_REASON_DESC:            Status Reason
  STATUS_CHANGE_TIMESTAMP:       Status Change Date
  STATUS_CHANGE_COMMENT:         Status Change Comment
  ACTIVATION_DATE:               Activation Date
  DEACTIVATION_DATE:             Deactivation Date
  REACTIVATION_DATE:             Reactivation Date
  ONLINE_STATUS_FLAG:            Is Online Active
  INSTANT_STATUS_FLAG:           Is Instant Active

