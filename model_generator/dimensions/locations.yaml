# locations.yaml — visible columns for DIMCORE.LOCATIONS (Strategy A)
# LOCATION_KEY is excluded (primary key, always hidden automatically)
# Excluded: _KEY FK columns (REPORT_TO_LOCATION_KEY, BILL_TO_LOCATION_KEY),
#           rep _IND flags, OTHER_* contacts, Mailing/Billing/Shipping addresses,
#           operational scheduling (CALL_*, COURIER_*, PROCALL_*),
#           LOAD_TIMESTAMP, SITE_KEY, SUB_SITE_KEY, CREATED_TIMESTAMP, CHANGED_TIMESTAMP

visible_columns:

  # ── Location Identification ───────────────────────────────────────────────
  LOCATION_NUMBER:               Retailer Number
  LOCATION_NAME:                 Retailer Name
  LOCATION_TYPE_CODE:            Location Type Code
  LOCATION_TYPE_DESC:            Location Type
  STORE_NUMBER:                  Store Number
  FIRST_RETAILER_NUMBER:         First Retailer Number
  NEXT_RETAILER_NUMBER:          Next Retailer Number
  PRIOR_RETAILER_NUMBER:         Prior Retailer Number
  TAX_NAME:                      Tax Name

  # ── Status ────────────────────────────────────────────────────────────────
  STATUS_CODE:                   Status Code
