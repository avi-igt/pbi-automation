# pbi-model-generator configuration file
# Run: python generate.py                        (generate all models)
#      python generate.py --model financial_daily (generate one model)
#      python generate.py --list                  (list all models)
#      python generate.py --env p1v1              (target environment)
#
# Credentials — never stored here, set as environment variables:
#   export SNOWFLAKE_USER=your_username
#   export SNOWFLAKE_PASSWORD=your_password

# ── Measure suffix rules ─────────────────────────────────────────────────────
# Columns whose names end with these suffixes become hidden source columns with
# a generated CALCULATE(SUM(...)) measure.
# Format: <SUFFIX> = <tmdl_type>, <format_string>
#   tmdl_type:     int64 | decimal
#   format_string: Power BI format string, e.g.  0  |  #,##0  |  #,##0.00
# If this section is omitted, the three defaults below are used automatically.
[measure_suffixes]
_COUNT    = int64,   0
_AMOUNT   = decimal, #,##0.00
_QUANTITY = int64,   #,##0

# ── Snowflake connection (default / shared) ───────────────────────────────────
[snowflake]
account       = igtgloballottery-igtpxv1_ldi
warehouse     = lpcdxv1_wh_ldi
database      = MOSQ1V1_DB_DH
role          = mosq1v1_ru_datareader
# Authentication: externalbrowser = SSO (no password needed) | snowflake = username + password
authenticator = externalbrowser

# Per-environment overrides (used with --env flag)
[snowflake.d1v1]
account   = igtgloballottery-igtd2v1_ldi.privatelink
warehouse = lpcdxv1_wh_ldi
database  = MOSQ1V1_DB_DH
