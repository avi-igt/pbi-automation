warehouse = WH_LDI_M
database  = MOSQ1V1_DB_DH

# ── Conformed dimensions ──────────────────────────────────────────────────────
# Each entry declares a shared dimension table used across semantic models.
# Format: <alias> = <SCHEMA.TABLE>, primary_key=<KEY_COLUMN>, strategy=<A|B>
#
# primary_key: the column used to join to fact tables. Matching is EXACT — only a
#              fact column whose name equals this value gets an active relationship.
#
# strategy controls which dimension columns appear in the Power BI field pane:
#
#   strategy=A  CONFIG-DRIVEN (default)
#               You control visibility via a YAML file at model_generator/dimensions/<alias>.yaml.
#               List only the columns that should be visible and give them business
#               display names. Any column not listed is hidden.
#               Use when: you want precise control over what report authors see,
#               or when display names differ from the Snowflake column names.
#               Requires: model_generator/dimensions/<alias>.yaml to exist. If missing, the tool
#               warns and hides all columns (model still generates correctly).
#
#   strategy=B  SNOWFLAKE INTROSPECTION
#               The tool queries information_schema.columns at runtime and
#               automatically hides ALL_UPPERCASE columns, surfaces Title_Case ones.
#               No YAML file needed.
#               Use when: the dimension is large and you want auto-discovery, or
#               when the Snowflake source already uses business-friendly column names.
#               Note: DIMCORE tables are ALL_UPPERCASE — Strategy B will hide
#               everything. Use Strategy A for DIMCORE dimensions.
#
# Default: strategy=A if omitted.
[dimensions]
dates      = DIMCORE.DATES,     primary_key=DATE_KEY,     strategy=A
products   = DIMCORE.PRODUCTS,  primary_key=PRODUCT_KEY,  strategy=A
locations  = DIMCORE.LOCATIONS, primary_key=LOCATION_KEY, strategy=B
terminals  = DIMCORE.TERMINALS, primary_key=TERMINAL_KEY, strategy=B

# Role-playing dimensions — same physical table, different alias and display name.
# inherit=<alias> reuses the parent alias's Strategy A YAML (no need to duplicate it).
# Reference in [model.*] dimensions list using alias:FACT_KEY to wire the relationship:
#   dates_first_val:FIRST_VALIDATION_DATE_KEY  →  fromColumn: FIRST_VALIDATION_DATE_KEY, toColumn: DATE_KEY
#
# dates_first_val = DIMCORE.DATES, primary_key=DATE_KEY, strategy=A, inherit=dates
# dates_last_val  = DIMCORE.DATES, primary_key=DATE_KEY, strategy=A, inherit=dates
# locations_to    = DIMCORE.LOCATIONS, primary_key=LOCATION_KEY, strategy=B, inherit=locations

# ── Semantic models ───────────────────────────────────────────────────────────
# display_name must follow handbook naming: Title Case + postfix (LDI / RSM / RPT)
# fact_table:  SCHEMA.TABLE or SCHEMA.VIEW in Snowflake
# dimensions:  comma-separated list of dimension keys defined in [dimensions] above
#              Use alias:FACT_COLUMN to override the join key when the fact table uses
#              a different column name than the dimension's primary_key.
#              Example: products:GAME_PRODUCT_KEY  →  fromColumn: GAME_PRODUCT_KEY, toColumn: PRODUCT_KEY

[model.financial_daily]
display_name = Financial Daily LDI
fact_table   = FINANCIAL.FINANCIAL_DAILY
dimensions   = dates, products, locations, terminals

[model.invoice_detail]
display_name = Invoice Detail LDI
fact_table   = FINANCIAL.INVOICE_DETAIL
dimensions   = dates, products, locations

[model.draw_sales]
display_name = Draw Sales LDI
fact_table   = DRAW.DRAW_SALES
dimensions   = dates, products, locations

[model.inventory_detail]
display_name = Inventory Detail LDI
fact_table   = INSTANT.INVENTORY_DETAIL
# Role-playing example: uncomment dates_first_val/dates_last_val in [dimensions] above,
# then add:  dates_first_val:FIRST_VALIDATION_DATE_KEY, dates_last_val:LAST_VALIDATION_DATE_KEY
dimensions   = dates, products, locations

[model.lvm_daily_bin_sales]
display_name = LVM Daily Bin Sales LDI
fact_table   = LVM.DAILY_BIN_SALES
dimensions   = dates, products, locations, terminals

[model.lvm_interval_bin_sales]
display_name = LVM Interval Bin Sales LDI
fact_table   = LVM.INTERVAL_BIN_SALES
dimensions   = dates, products, locations, terminals

[model.promotion_summary]
display_name = Promotion Summary LDI
fact_table   = PROMOTION.PROMOTION_SUMMARY
dimensions   = dates, products, locations, terminals

[model.order_detail]
display_name = Order Detail LDI
fact_table   = INSTANT.ORDER_DETAILS
dimensions   = dates, products:GAME_PRODUCT_KEY
